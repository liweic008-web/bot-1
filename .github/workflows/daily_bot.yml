name: Daily Discord Status Updater

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch: 

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 🔍 新增這一步：幫我們檢查保險箱到底有沒有東西！
    - name: Check Environment Variables
      env:
        CHECK_TOKEN: ${{ secrets.DISCORD_TOKEN }}
      run: |
        if [ -z "$CHECK_TOKEN" ]; then
          echo "❌ 警告：GitHub Secrets 裡的 DISCORD_TOKEN 是空的！請檢查設定。"
          exit 1
        else
          echo "✅ 成功：GitHub Secrets 有成功讀取到資料！"
        fi

    # 4. 執行 Python 腳本
    - name: Run bot script
      env:
        DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
      run: python bot.py
